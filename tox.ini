[tox]
skipsdist = true
envlist = py311, py312, py313

[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
passenv = PYTHON_VERSION
allowlist_externals = pixi
commands =
    pixi run -e {envname} python -m pytest --doctest-modules tests --cov --cov-config=pyproject.toml --cov-report=xml
    pixi run -e {envname} pyright
