[workspace]
authors = ["Mateus Pinto da Silva <mateusps10@outlook.com>"]
channels = ["conda-forge"]
name = "AgriGEE.lite"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
pre-commit-install = "pre-commit install"
check = { cmd = "pre-commit run -a && pyright && deptry ." }
test = "python -m pytest --cov --cov-config=pyproject.toml --cov-report=xml"
download-test-files = "python tests/download_test_files.py"
docs = "mkdocs serve"
docs-test = "mkdocs build -s"
docs-publish = "mkdocs gh-deploy"
build = "python -m build"
publish = "twine upload --repository-url https://upload.pypi.org/legacy/ dist/*"

# Native packages — conda-forge handles GDAL/PROJ/arrow/etc.
[dependencies]
python = "3.14.*"
geopandas = ">=1.0.1"
pandas = ">=3.0.0"
tqdm = ">=4.67.1"
pyarrow = ">=19.0.1"
sqlalchemy = ">=2.0.47,<3"

# Pure-Python packages only on PyPI
[pypi-dependencies]
agrigee_lite = { path = ".", editable = true }
h3 = ">=4.1.0,<5"
parallel-pandas = "*"
earthengine-api = ">=1.5.7"
ee-s1-ard = ">=1.0.5"
pandera = ">=0.26.1"
topojson = ">=1.9"
aiohttp = ">=3.13.5, <4"
tenacity = ">=9.1.4, <10"
uvloop = ">=0.22.1, <0.23"

[feature.dev.pypi-dependencies]
pytest = ">=8.3.5"
pre-commit = ">=4.2.0"
deptry = ">=0.23.0"
pyright = ">=1.1.407"
pytest-cov = ">=6.0.0"
ruff = ">=0.11.2"
mkdocs = ">=1.6.1"
mkdocs-material = ">=9.6.9"
mkdocstrings = { version = ">=0.29.0", extras = ["python"] }
ipykernel = ">=6.29.5"
ipywidgets = ">=8.0.0"
pandas-stubs = ">=3.0.0"
types-shapely = ">=2.0.0.20250202"
types-tqdm = ">=4.67.0.20250319"
build = ">=1.2.0"
twine = ">=6.0.0"

[feature.visualization.pypi-dependencies]
matplotlib = ">=3.10.1"
plotly = ">=6.2.0"

[feature.tasks-extra.pypi-dependencies]
smart-open = { version = ">=7.1.0", extras = ["gcs"] }

[feature.api.pypi-dependencies]
fastapi = { version = ">=0.115.0", extras = ["standard"] }
uvicorn = { version = ">=0.34.0", extras = ["standard"] }

[feature.postgis.pypi-dependencies]
psycopg2-binary = ">=2.9.0"

[environments]
default = { features = ["dev"], solve-group = "default" }
visualization = { features = ["visualization"], solve-group = "default" }
tasks-extra = { features = ["tasks-extra"], solve-group = "tasks-extra" }
api = { features = ["api"], solve-group = "default" }
all-features = { features = ["visualization", "api", "postgis", "dev"], solve-group = "default" }
